services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: road_quality
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/db/migrations:/docker-entrypoint-initdb.d:ro
    ports: ["3307:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: ${DB_ROOT_PASSWORD}
      DB_NAME: road_quality
      JWT_SECRET: ${JWT_SECRET}
      DETECT_CONF_THRESHOLD: "0.85"
    volumes:
      - ./backend/models:/app/backend/models:ro
    ports: ["3000:3000"]
    depends_on:
      mysql: { condition: service_healthy }

volumes:
  mysql-data:
  
  

    